[study]
name = "learned_reinforcement_continuation"
description = "Tier B+ linear, MLP, and Transformer policies in a verifier-noisy POMDP"
seeds = [104729, 130363, 155921, 181081, 206369]
uncertainty = "two-sided 95% Student-t interval across five full-pipeline seeds"

[[experiments]]
