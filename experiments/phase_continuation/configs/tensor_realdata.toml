[study]
name = "tensor_synthetic_natural_bridge"
description = "Byte-level bridge from controlled tasks to bounded natural corpora"
seeds = [104729, 130363, 155921, 181081, 206369]
uncertainty = "two-sided 95% Student-t interval across five full-pipeline seeds"

[[experiments]]
domain = "transformer"
family = "tensor_realdata"
variants = ["natural_injected", "tinystories", "simplestories", "fineweb_edu", "dolma"]
stage = "confirmatory"
control_name = "sample_coefficient"
controls = [0.5, 1.0, 2.0, 4.0]
sizes = [64, 96, 128]
parameters = { fidelity_tier = "B+", sequence_length = 96, depth = 4, heads = 4, ff_ratio = 4.0, normalization = "pre_rmsnorm", optimizer = "adamw", steps = 480, batch_size = 48, eval_examples = 512, learning_rate = 0.0006, weight_decay = 0.01, noise = 0.10, ood_shift = 0.20, sample_exponent = 1.5, train_cap = 32768, ood_data_kind = "fineweb_edu" }
parameter_grid = { activation = ["gelu", "swiglu"] }
