[study]
name = "tensor_confirm_mlp"
description = "Frozen parameter-matched feed-forward confirmation on untouched seeds"
seeds = [231503, 256541, 281549, 306577, 331613, 356651, 381679, 406717, 431729, 456769, 481793, 506821]
uncertainty = "two-sided 95% Student-t interval across twelve full-pipeline outer seeds"

[[experiments]]
domain = "transformer"
family = "tensor_mlp"
variants = ["linear", "gelu"]
stage = "heldout_confirmation"
control_name = "sample_coefficient"
controls = [2.0, 4.0, 8.0]
sizes = [64, 128, 192]
parameters = { evidence_tier = "B", data_kind = "synthetic_retrieval", sequence_length = 64, depth = 3, heads = 4, ff_ratio = 4.0, normalization = "pre_rmsnorm", optimizer = "adamw", steps = 300, batch_size = 64, eval_examples = 512, learning_rate = 0.001, weight_decay = 0.01, noise = 0.12, ood_shift = 0.18, sample_exponent = 1.0, train_cap = 16384, frozen_from = "empirical_phase_tensor_o1_v2" }

[[experiments]]
domain = "transformer"
family = "tensor_mlp"
variants = ["geglu", "swiglu"]
stage = "heldout_confirmation"
control_name = "sample_coefficient"
controls = [2.0, 4.0, 8.0]
sizes = [64, 128, 192]
parameters = { evidence_tier = "B", data_kind = "synthetic_retrieval", sequence_length = 64, depth = 3, heads = 4, ff_ratio = 2.6666666667, normalization = "pre_rmsnorm", optimizer = "adamw", steps = 300, batch_size = 64, eval_examples = 512, learning_rate = 0.001, weight_decay = 0.01, noise = 0.12, ood_shift = 0.18, sample_exponent = 1.0, train_cap = 16384, frozen_from = "empirical_phase_tensor_o1_v2" }

