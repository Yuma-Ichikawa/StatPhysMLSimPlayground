schema_version = "1.0"
thesis = "A hierarchical theory-to-reality taxonomy becomes falsifiable when every deformation is scored by predictive phase continuation on untouched evidence."

[[claims]]
id = "C1_predictive_boundary_transport"
layer = "methodology"
tier = "A"
status = "confirmed_controlled"
anchor = "solvable or oracle four-domain anchor"
deformation = "held-out architecture, trajectory, feedback, or population rule"
primary_order = "domain-specific semantic order"
alternative = "constant, source-boundary, size-only, and base-surrogate predictors"
holdout = "predictive_phase_continuation_v2 holdout variants"
artifact = "paper/generated/results.tex"
falsifier = "The augmented predictor fails to improve on registered baselines on the evaluation split."

[[claims]]
id = "C2_transformer_module_response"
layer = "scientific_finding"
tier = "B"
status = "confirmed_frozen"
anchor = "causal retrieval Transformer with parameter-matched feed-forward blocks"
deformation = "linear, GELU, GEGLU, or SwiGLU feed-forward interaction"
primary_order = "task success and bounded attention/MLP risk deltas"
alternative = "parameter count or terminal-loss-only explanation"
holdout = "confirmation/tensor_confirm_mlp.toml"
artifact = "phase_tensor_confirmation_v3 aggregate"
falsifier = "Activation contrasts disappear under matched parameters and fresh seeds."

[[claims]]
id = "C3_optimizer_geometry"
layer = "scientific_finding"
tier = "B"
status = "confirmed_frozen"
anchor = "learning rates selected only on the completed calibration slice"
deformation = "SGD-M, AdamW, Muon, or SOAP crossed with normalization"
primary_order = "O(1) test risk, update-to-weight ratio, gradient noise, and time to order"
alternative = "all endpoint differences are learning-rate or update-scale mismatch"
holdout = "confirmation/tensor_confirm_optimizer.toml"
artifact = "phase_tensor_confirmation_v3 aggregate"
falsifier = "Frozen optimizer contrasts vanish and geometry does not predict dynamics."

[[claims]]
id = "C4_scaling_and_natural_transport"
layer = "scientific_finding"
tier = "B/C"
status = "confirmed_frozen"
anchor = "uncapped synthetic data-scaling paths and byte-level corpus protocol"
deformation = "sample exponent or version-pinned natural corpus"
primary_order = "O(1) train/test/OOD risk and direct task success"
alternative = "apparent scaling is a train-cap artifact; corpus effects are split overlap"
holdout = "confirmation/tensor_confirm_scaling.toml and tensor_confirm_natural.toml"
artifact = "phase_tensor_confirmation_v3 aggregate"
falsifier = "Path differences disappear without the cap or natural results fail on byte-disjoint splits."

[[claims]]
id = "C5_cross_domain_validation"
layer = "external_method_validation"
tier = "A"
status = "confirmed_controlled"
anchor = "domain-specific oracle models"
deformation = "diffusion trajectory, RL feedback, or multi-agent coupling"
primary_order = "speciation, gold reward/strategy support, or truth-conditioned consensus"
alternative = "the common protocol works only for equilibrium-like Transformer surrogates"
holdout = "predictive_phase_continuation_v2 domain holdouts"
artifact = "paper/generated/results.tex"
falsifier = "Held-out prediction and intervention diagnostics fail outside Transformers."
