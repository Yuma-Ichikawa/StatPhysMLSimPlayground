[sweep]
name = "sample_complexity_paths"
description = "Explicit n=c*d^gamma comparison for H5."
stage = "exploratory-scaling-path"
replicas = 12
root_seed = 1732051

[base]
experiment = "sample_complexity_exponent"
initialization = "random"
tags = ["exploratory", "sample-complexity", "explicit-scaling-path"]

[base.phase]
architecture = "m0_tied_low_rank"
data = "d0_gaussian"
positional_mixture = 0.3
input_noise = 0.5
regularization = 0.01
temperature = 1.0

[base.phase.scaling]
d_model = 16
sequence_length = 2
n_heads = 1
head_dim = 1
n_layers = 1
teacher_rank = 1
sample_coefficient = 0.25
sample_exponent = 1.0

[base.training]
optimizer = "adam"
learning_rate = 0.01
weight_decay = 0.01
max_steps = 2500
min_steps = 2500
checkpoint_interval = 250
log_interval = 25
patience = 2501
precision = "float32"

[base.observables]
heldout_size = 8192
trajectory_interval = 25
spectrum_interval = 100
intervention_interval = 2500

[base.seeds]
root = 1732051

[grid]
"phase.architecture" = ["m0_tied_low_rank", "m2_qkvo"]
"phase.scaling.d_model" = [16, 32, 64, 128]
"phase.scaling.sample_coefficient" = [0.25, 0.5, 1.0]
"phase.scaling.sample_exponent" = [1.0, 2.0]
"phase.positional_mixture" = [0.2, 0.3, 0.4]
