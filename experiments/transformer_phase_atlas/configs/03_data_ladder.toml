[sweep]
name = "data_ladder"
description = "D0--D5 distribution robustness at fixed M3 architecture."
stage = "exploratory-data"
replicas = 8
root_seed = 577215

[base]
experiment = "data_distribution_robustness"
initialization = "random"
tags = ["exploratory", "data-ladder"]

[base.phase]
architecture = "m3_multi_head"
data = "d0_gaussian"
semantic_mixture = 0.7
input_noise = 0.5
regularization = 0.0001
temperature = 1.0
tail_degrees_freedom = 3.0
covariance_condition = 8.0

[base.phase.scaling]
d_model = 64
sequence_length = 8
n_heads = 4
head_dim = 16
n_layers = 1
teacher_rank = 4
sample_coefficient = 1.0

[base.training]
optimizer = "adamw"
learning_rate = 0.001
weight_decay = 0.0001
batch_size = 256
max_steps = 3000
min_steps = 750
checkpoint_interval = 300
log_interval = 25
patience = 600
gradient_clip = 1.0
precision = "bfloat16"

[base.observables]
heldout_size = 2048
trajectory_interval = 25
spectrum_interval = 300
intervention_interval = 3000

[base.seeds]
root = 577215

[grid]
"phase.data" = ["d0_gaussian", "d1_elliptical", "d2_heavy_tailed", "d3_codebook", "d4_hmm", "d5_grammar"]
"phase.scaling.sample_coefficient" = [0.5, 1.0, 2.0, 4.0]
"phase.semantic_mixture" = [0.6, 0.7, 0.8]

